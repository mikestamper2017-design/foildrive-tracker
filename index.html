<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Swellpath | Precision Session Analytics</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <link rel="stylesheet" href="app.css">
</head>
<body>

    <header class="app-header">
        <div class="logo">Swellpath</div>
        <div class="subtitle">Precision Unassisted Wave Tracking</div>
    </header>

    <main class="container">
        <div id="dropZone" class="drop-zone">
            <span class="drop-zone-text">
                <span class="desktop-text">Drop your .tcx or .gpx file here</span>
                <span class="mobile-text">Tap to Upload File</span>
            </span>
            <input type="file" id="fileInput" accept=".tcx,.gpx" style="display: none;">
        </div>

        <div id="dashboard" class="dashboard dashboard-hidden">
            <div class="metric-card">
                <span class="label">Flight Time</span>
                <span id="flightTime" class="value">-</span>
            </div>
            <div class="metric-card">
                <span class="label">Motor Assist</span>
                <span id="motorTime" class="value">-</span>
            </div>
            <div class="metric-card">
                <span class="label">Max Speed</span>
                <span id="maxSpeed" class="value">-</span>
            </div>
            <div class="metric-card">
                <span class="label">Wave Count</span>
                <span id="waveCount" class="value">-</span>
            </div>
            <div class="metric-card longest-wave-card">
                <span class="label">Longest Wave</span>
                <span id="longestWave" class="value">-</span>
            </div>
            <div class="metric-card fastest-wave-card">
                <span class="label">Fastest Wave</span>
                <span id="fastestWave" class="value">-</span>
            </div>
        </div>

        <div class="controls-wrapper">
            <label class="switch-container">
                <input type="checkbox" id="toggleWaveOnly">
                <span class="slider"></span>
                <span class="toggle-text">Only show wave runs</span>
            </label>

            <button id="shareBtn" class="action-btn">Copy Session to Clipboard</button>
        </div>

        <div id="mapContainer" class="map-container"></div>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="app.js"></script>
</body>
</html>
