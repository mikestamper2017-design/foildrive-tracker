<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FoilDrive Tracker</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css" />

    <style>
        :root {
            --bg-color: #FAFAFA;
            --card-bg: #FFFFFF;
            --text-color: #111111;
            --secondary-text: #666666;
            --accent-color: #000000;
            --border-color: #E6E6E6;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.04), 0 1px 1px rgba(0,0,0,0.02);
            --radius: 12px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            padding: 60px 20px;
        }

        .container {
            max-width: 840px;
            margin: 0 auto;
        }

        header {
            margin-bottom: 55px;
            text-align: center;
        }

        h1 {
            font-size: 28px;
            font-weight: 400;
            letter-spacing: -0.6px;
            margin-bottom: 6px;
        }

        .subtitle {
            font-size: 11px;
            color: var(--secondary-text);
            letter-spacing: 1.2px;
            text-transform: uppercase;
        }

        .upload-section {
            margin-bottom: 40px;
        }

        .drop-zone {
            border: 1.5px solid var(--border-color);
            padding: 65px 20px;
            text-align: center;
            background-color: var(--card-bg);
            border-radius: var(--radius);
            cursor: pointer;
            transition: all 0.25s ease-in-out;
            box-shadow: var(--shadow-sm);
        }

        .drop-zone:hover {
            border-color: var(--accent-color);
            transform: translateY(-1px);
        }

        .drop-zone p {
            font-size: 14px;
            color: var(--secondary-text);
        }

        .file-label {
            color: var(--text-color);
            text-decoration: underline;
            font-weight: 500;
            cursor: pointer;
        }

        .dashboard-hidden {
            display: none !important;
        }

        #dashboard {
            display: grid;
            gap: 32px;
        }

        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
            gap: 20px;
        }

        .metric-card {
            background-color: var(--card-bg);
            padding: 24px 28px;
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            box-shadow: var(--shadow-sm);
            transition: transform 0.2s ease;
        }

        .metric-card:hover {
            transform: translateY(-2px);
        }

        .metric-card h3 {
            font-size: 11px;
            text-transform: uppercase;
            color: var(--secondary-text);
            margin-bottom: 10px;
            letter-spacing: 0.8px;
            font-weight: 600;
        }

        .metric-card p {
            font-size: 28px;
            font-weight: 400;
            letter-spacing: -0.5px;
            color: var(--text-color);
        }

        .map-box {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            height: 380px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--secondary-text);
            font-size: 12px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            box-shadow: var(--shadow-sm);
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>FoilDrive Session Analyzer</h1>
            <p class="subtitle">Minimal, clear performance analysis</p>
        </header>

        <section class="upload-section">
            <div class="drop-zone" id="dropZone">
                <p>Drag and drop your Garmin .TCX or .GPX files here, or <label for="fileInput" class="file-label">browse</label></p>
                <input type="file" id="fileInput" accept=".gpx, .tcx" style="display: none;">
            </div>
        </section>

        <section id="dashboard" class="dashboard-hidden">
            <div class="metrics-grid">
                <div class="metric-card">
                    <h3>Flight Time</h3>
                    <p id="flightTime">--</p>
                </div>
                <div class="metric-card">
                    <h3>Motor Assist Time</h3>
                    <p id="motorTime">--</p>
                </div>
                <div class="metric-card">
                    <h3>Max Speed</h3>
                    <p id="maxSpeed">-- km/h</p>
                </div>
                <div class="metric-card">
                    <h3>Wave Count</h3>
                    <p id="waveCount">0</p>
                </div>
                <div class="metric-card">
                    <h3>Longest Wave</h3>
                    <p id="longestWave">-- m</p>
                </div>
                <div class="metric-card">
                    <h3>Fastest Wave</h3>
                    <p id="fastestWave">-- km/h</p>
                </div>
            </div>

            <div style="margin-top: 16px; margin-bottom: 8px; text-align: right;">
                <button id="shareBtn" style="background-color: var(--text-color); color: var(--card-bg); border: none; padding: 10px 20px; font-size: 11px; text-transform: uppercase; letter-spacing: 0.8px; border-radius: var(--radius); cursor: pointer; transition: background 0.2s;">
                    📋 Copy Session to Clipboard
                </button>
            </div>

            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
                <p class="subtitle" style="margin: 0;">Downwind Wave Track Visualization</p>
                <label style="font-size: 11px; text-transform: uppercase; letter-spacing: 0.8px; color: var(--secondary-text); cursor: pointer;">
                    <input type="checkbox" id="toggleWaveOnly" style="accent-color: var(--text-color); margin-right: 6px;">
                    Only Show Wave Runs
                </label>
            </div>

            <div id="mapContainer" class="map-box" style="width: 100%; height: 380px; border-radius: var(--radius); overflow: hidden;"></div>
        </section>
    </div>

    <script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js"></script>
    <script src="app.js"></script>
</body>
</html>
